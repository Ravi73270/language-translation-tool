<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaShift – Language Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">LinguaShift</span>
      </div>
      <p class="header-tagline">Translate anything, instantly</p>
    </div>
  </header>

  <!-- ========== MAIN ========== -->
  <main class="main">

    <!-- Language Bar -->
    <div class="lang-bar">
      <div class="lang-select-wrap">
        <label class="lang-label" for="source-lang">From</label>
        <select id="source-lang" class="lang-select">
          {% for lang in languages %}
          <option value="{{ lang.code }}" {% if lang.code == 'en' %}selected{% endif %}>
            {{ lang.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <button class="swap-btn" id="swap-btn" title="Swap languages" aria-label="Swap languages">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
        </svg>
      </button>

      <div class="lang-select-wrap">
        <label class="lang-label" for="target-lang">To</label>
        <select id="target-lang" class="lang-select">
          {% for lang in languages %}
          <option value="{{ lang.code }}" {% if lang.code == 'hi' %}selected{% endif %}>
            {{ lang.name }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Translation Panel -->
    <div class="panel-grid">

      <!-- Source Panel -->
      <div class="panel panel--source">
        <div class="panel-header">
          <span class="panel-title">Source text</span>
          <div class="panel-actions">
            <button class="icon-btn" id="clear-btn" title="Clear text" aria-label="Clear input">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
            <button class="icon-btn" id="speak-source-btn" title="Listen" aria-label="Listen to source text">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            </button>
          </div>
        </div>
        <textarea
          id="source-text"
          class="text-area"
          placeholder="Enter text to translate…"
          maxlength="500"
          autofocus
          aria-label="Source text"
        ></textarea>
        <div class="panel-footer">
          <span id="char-counter" class="char-counter">0 / 500</span>
          <button class="translate-btn" id="translate-btn">
            <span id="btn-label">Translate</span>
            <svg id="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
            <svg id="btn-spinner" class="spinner hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M12 2a10 10 0 1 0 10 10"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Target Panel -->
      <div class="panel panel--target">
        <div class="panel-header">
          <span class="panel-title" id="target-panel-label">Translation</span>
          <div class="panel-actions">
            <button class="icon-btn" id="copy-btn" title="Copy translation" aria-label="Copy translated text">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
            <button class="icon-btn" id="speak-target-btn" title="Listen" aria-label="Listen to translation">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="output-area" class="output-area">
          <span class="output-placeholder">Your translation will appear here…</span>
        </div>
        <div id="error-area" class="error-area hidden"></div>
        <div class="panel-footer panel-footer--target">
          <span id="copy-toast" class="copy-toast hidden">✓ Copied Successfully!</span>
        </div>
      </div>

    </div><!-- /panel-grid -->

    <!-- Quick Language Chips -->
    <div class="quick-langs">
      <span class="quick-label">Quick switch target:</span>
      <div class="chips">
        <button class="chip active" data-lang="hi">Hindi</button>
        <button class="chip" data-lang="es">Spanish</button>
        <button class="chip" data-lang="fr">French</button>
        <button class="chip" data-lang="de">German</button>
        <button class="chip" data-lang="zh">Chinese</button>
        <button class="chip" data-lang="ja">Japanese</button>
        <button class="chip" data-lang="ar">Arabic</button>
        <button class="chip" data-lang="ru">Russian</button>
      </div>
    </div>

  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <p>Powered by <strong>MyMemory API</strong> &nbsp;|&nbsp; Built by <strong>Ravi Sahu</strong> for CodeAlpha Internship</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
